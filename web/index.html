<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local KZ</title>
    <link rel="icon" href="../icon.ico" type="image/x-icon" />
    <link rel="shortcut icon" href="../icon.ico" type="image/x-icon" />
    <style>
        :root {
            --bg-main: #2D2D44;
            --bg-card: #1E1E2E;
            --bg-dropdown: #2D2D44;
            --border-dropdown: #45475A;
            --text-primary: #CDD6F4;
            --text-secondary: #A6ADC8;
            --active-bg: #89B4FA;
            --active-text: #1E1E2E;
            --t1: #6bc96f;
            --t2: #33bd3a;
            --t3: #d8e302;
            --t4: #FFC107;
            --t5: #e37910;
            --t6: #e34202;
            --t7: #e31c02;
            --t8: #bb02db;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1E1E2E;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 30px 60px;
            color: var(--text-primary);
            min-height: 100vh;
        }

        .filters-panel {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(45, 45, 68, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 16px 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(69, 71, 90, 0.5);
            display: flex;
            gap: 12px 20px;
            align-items: center;
            width: auto;
            max-width: 90%;
            pointer-events: auto;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 6px;
            position: relative;
        }

        .slider-container {
            display: flex;
            background: #1a1a2e;
            border-radius: 8px;
            padding: 3px;
            position: relative;
            height: 34px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .slider-container .slider-option {
            padding: 0 14px;
            height: 28px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.3s ease;
            font-family: inherit;
            white-space: nowrap;
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slider-container .slider-option.active {
            color: var(--active-text);
        }

        .slider-container .slider-bg {
            position: absolute;
            top: 3px;
            left: 3px;
            height: 28px;
            border-radius: 6px;
            background: var(--active-bg);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
            box-shadow: 0 2px 8px rgba(137, 180, 250, 0.3);
        }

        /* Начальное состояние слайдера - скрыто до инициализации */
        .slider-container:not(.initialized) .slider-bg {
            transition: none !important;
        }

        .slider-container .slider-option:hover:not(.active) {
            color: var(--text-primary);
        }

        .slider-container.two-options .slider-bg {
            width: calc(50% - 3px);
        }

        .slider-container.three-options .slider-bg {
            width: calc(33.333% - 3px);
        }

        .btn-dropdown {
            height: 34px;
            padding: 0 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            background: #1a1a2e;
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.06);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            font-family: inherit;
            white-space: nowrap;
            min-width: 90px;
        }
        .btn-dropdown:hover {
            background: #3A3A55;
            border-color: rgba(255, 255, 255, 0.1);
        }
        .btn-dropdown .arrow {
            font-size: 12px;
            transition: transform 0.2s;
            opacity: 0.7;
        }
        .btn-dropdown .arrow.open {
            transform: rotate(180deg);
        }
        #tierCount {
            font-weight: 600;
            color: var(--active-bg);
            font-size: 12px;
        }

        .dropdown-wrapper {
            position: relative;
        }

        .dropdown-menu {
            position: absolute;
            right: 0;
            top: calc(100% + 8px);
            min-width: 220px;
            background: var(--bg-dropdown);
            border: 1px solid var(--border-dropdown);
            border-radius: 12px;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.5);
            padding: 4px 0;
            display: none;
            z-index: 30;
            overflow: hidden;
        }
        .dropdown-menu.open {
            display: block;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 14px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: background 0.12s;
            background: transparent;
            border: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
            min-height: 36px;
            box-sizing: border-box;
        }
        .dropdown-item:hover {
            background: #3A3A55;
        }
        .dropdown-item .color-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .dropdown-item .label {
            flex: 1;
            white-space: nowrap;
            font-weight: 450;
        }
        .dropdown-item .check {
            color: #22c55e;
            flex-shrink: 0;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-input {
            height: 34px;
            padding: 0 16px;
            border-radius: 8px;
            font-size: 13px;
            background: #1a1a2e;
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.06);
            outline: none;
            width: 160px;
            font-family: inherit;
            transition: all 0.2s;
        }
        .search-input::placeholder {
            color: #6C7086;
        }
        .search-input:focus {
            border-color: var(--active-bg);
            box-shadow: 0 0 0 2px rgba(137, 180, 250, 0.15);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin-top: 90px;
        }
        .card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-dropdown);
            transition: 0.15s;
        }
        .card:hover {
            border-color: var(--active-bg);
            transform: translateY(-2px);
        }
        .card img {
            width: 100%;
            aspect-ratio: 16/10;
            object-fit: cover;
            display: block;
        }
        .card .card-body {
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .card .tier-name {
            font-size: 12px;
            font-weight: 700;
        }
        .card .map-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card .map-title .steam-link {
            display: inline-flex;
            align-items: center;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
            flex-shrink: 0;
        }
        .card .map-title .steam-link:hover {
            color: var(--active-bg);
        }
        .card .coursename {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card .best-time {
            font-size: 12px;
            color: #A6E3A1;
            margin-top: 2px;
        }

        .loading, .error, .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            font-size: 16px;
            color: #6C7086;
        }
        .error { color: #F28B82; }

        @media (max-width: 1200px) {
            .cards-grid { grid-template-columns: repeat(4, 1fr); }
        }
        @media (max-width: 1024px) {
            .filters-panel {
                max-width: 95%;
                gap: 10px 15px;
                padding: 12px 16px;
            }
            .slider-container .slider-option {
                padding: 0 10px;
                font-size: 11px;
            }
        }
        @media (max-width: 900px) {
            .cards-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 768px) {
            .filters-panel {
                flex-direction: column;
                align-items: stretch;
                top: 10px;
                padding: 14px;
                width: 96vw;
                max-width: 96vw;
                gap: 8px;
                border-radius: 14px;
            }
            .filter-group {
                flex-wrap: wrap;
                justify-content: center;
            }
            .slider-container {
                flex: 1;
                min-width: 180px;
            }
            .slider-container .slider-option {
                flex: 1;
                padding: 0 8px;
                font-size: 11px;
            }
            .search-input { width: 100%; }
            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
                margin-top: 300px;
                gap: 12px;
            }
            .btn-dropdown {
                min-width: 80px;
                font-size: 11px;
            }
            .dropdown-menu {
                min-width: 200px;
                right: 50%;
                transform: translateX(50%);
            }
        }
        @media (max-width: 480px) {
            .cards-grid { grid-template-columns: 1fr; }
            .dropdown-menu {
                min-width: 180px;
                right: 0;
                transform: none;
            }
        }
    </style>
</head>
<body>

    <div class="filters-panel" id="filtersPanel">
        <div class="filter-group">
            <div class="slider-container two-options" data-group="mode">
                <div class="slider-bg" id="modeBg"></div>
                <button class="slider-option" data-value="ckz">CKZ</button>
                <button class="slider-option" data-value="vnl">VNL</button>
            </div>
        </div>

        <div class="filter-group">
            <div class="slider-container two-options" data-group="type">
                <div class="slider-bg" id="typeBg"></div>
                <button class="slider-option" data-value="nub">Overall</button>
                <button class="slider-option" data-value="pro">Pro</button>
            </div>
        </div>

        <div class="filter-group">
            <div class="slider-container three-options" data-group="course">
                <div class="slider-bg" id="courseBg"></div>
                <button class="slider-option" data-value="all">All</button>
                <button class="slider-option" data-value="main">Main</button>
                <button class="slider-option" data-value="bonus">Bonus</button>
            </div>
        </div>

        <div class="filter-group">
            <div class="slider-container three-options" data-group="pb">
                <div class="slider-bg" id="pbBg"></div>
                <button class="slider-option" data-value="all">All</button>
                <button class="slider-option" data-value="pb">PB</button>
                <button class="slider-option" data-value="nopb">No PB</button>
            </div>
        </div>

        <div class="filter-group" style="flex:1; min-width:120px;">
            <input type="text" class="search-input" id="searchInput" placeholder="Search map..." />
        </div>

        <div class="filter-group" style="margin-left: auto;">
            <div class="dropdown-wrapper" id="tierDropdown">
                <button class="btn-dropdown" id="tierToggle">
                    Tiers <span id="tierCount"></span>
                    <span class="arrow" id="tierArrow">▼</span>
                </button>
                <div class="dropdown-menu" id="tierMenu"></div>
            </div>
        </div>
    </div>

    <div id="cardsContainer" class="cards-grid"><div class="loading">Loading...</div></div>

    <script>
        (function() {
            const container = document.getElementById('cardsContainer');
            let allMaps = [];

            const TIER_OPTIONS = [
                { value: 1, label: '1 - Very Easy', color: 'var(--t1)' },
                { value: 2, label: '2 - Easy', color: 'var(--t2)' },
                { value: 3, label: '3 - Medium', color: 'var(--t3)' },
                { value: 4, label: '4 - Advanced', color: 'var(--t4)' },
                { value: 5, label: '5 - Hard', color: 'var(--t5)' },
                { value: 6, label: '6 - Very Hard', color: 'var(--t6)' },
                { value: 7, label: '7 - Extreme', color: 'var(--t7)' },
                { value: 8, label: '8 - Death', color: 'var(--t8)' },
                { value: 9, label: '9 - Unfeasible', color: '#dbdbdb' },
                { value: 10, label: '10 - Impossible', color: '#d1d1d1' }
            ];

            // Загрузка сохраненных настроек из localStorage
            function loadFiltersState() {
                try {
                    const saved = localStorage.getItem('kzFilters');
                    if (saved) {
                        return JSON.parse(saved);
                    }
                } catch (e) {}
                return null;
            }

            // Сохранение настроек в localStorage
            function saveFiltersState() {
                const state = {
                    mode: currentMode,
                    type: currentType,
                    course: currentCourse,
                    pb: currentPb,
                    tiers: Array.from(selectedTiers),
                    search: searchTerm
                };
                try {
                    localStorage.setItem('kzFilters', JSON.stringify(state));
                } catch (e) {}
            }

            // Восстановление состояния или значения по умолчанию
            const savedState = loadFiltersState();
            let currentMode = savedState?.mode || 'ckz';
            let currentType = savedState?.type || 'nub';
            let currentCourse = savedState?.course || 'main';
            let currentPb = savedState?.pb || 'all';
            let selectedTiers = new Set(savedState?.tiers || []);
            let searchTerm = savedState?.search || '';
            let refreshInterval = null;

            function formatTime(seconds) {
                if (!seconds || seconds <= 0) return '—';
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${String(mins).padStart(2, '0')}:${secs.toFixed(3).padStart(6, '0')}`;
            }

            function initSliders() {
                document.querySelectorAll('.slider-container').forEach(container => {
                    const options = container.querySelectorAll('.slider-option');
                    const bg = container.querySelector('.slider-bg');
                    const group = container.dataset.group;

                    // Устанавливаем активную кнопку из сохраненного состояния
                    let activeValue = null;
                    if (group === 'mode') activeValue = currentMode;
                    else if (group === 'type') activeValue = currentType;
                    else if (group === 'course') activeValue = currentCourse;
                    else if (group === 'pb') activeValue = currentPb;

                    options.forEach(opt => {
                        if (opt.dataset.value === activeValue) {
                            opt.classList.add('active');
                        } else {
                            opt.classList.remove('active');
                        }
                    });

                    // Сразу устанавливаем позицию без анимации
                    updateSliderPosition(container, bg, true);
                    
                    // Добавляем класс initialized для включения анимации
                    container.classList.add('initialized');

                    options.forEach((opt) => {
                        opt.addEventListener('click', function() {
                            options.forEach(o => o.classList.remove('active'));
                            this.classList.add('active');
                            updateSliderPosition(container, bg, false);

                            const value = this.dataset.value;
                            if (group === 'mode') currentMode = value;
                            else if (group === 'type') currentType = value;
                            else if (group === 'course') currentCourse = value;
                            else if (group === 'pb') currentPb = value;

                            saveFiltersState();
                            applyFilters();
                        });
                    });
                });
            }

            function updateSliderPosition(container, bg, instant = false) {
                const active = container.querySelector('.slider-option.active');
                if (!active) return;

                // Если instant, отключаем анимацию
                if (instant) {
                    bg.style.transition = 'none';
                }

                const containerRect = container.getBoundingClientRect();
                const activeRect = active.getBoundingClientRect();

                const left = activeRect.left - containerRect.left;
                const width = activeRect.width;

                bg.style.left = left + 'px';
                bg.style.width = width + 'px';

                // Возвращаем анимацию
                if (instant) {
                    // Форсируем reflow
                    void bg.offsetHeight;
                    bg.style.transition = '';
                }
            }

            function updateAllSliders() {
                document.querySelectorAll('.slider-container').forEach(container => {
                    const bg = container.querySelector('.slider-bg');
                    updateSliderPosition(container, bg, false);
                });
            }

            function initTierDropdown() {
                const menu = document.getElementById('tierMenu');
                const toggle = document.getElementById('tierToggle');
                const arrow = document.getElementById('tierArrow');
                const countSpan = document.getElementById('tierCount');

                function renderMenu() {
                    menu.innerHTML = '';
                    TIER_OPTIONS.forEach(opt => {
                        const item = document.createElement('button');
                        item.className = 'dropdown-item';
                        const dot = document.createElement('span');
                        dot.className = 'color-dot';
                        dot.style.backgroundColor = opt.color;
                        const label = document.createElement('span');
                        label.className = 'label';
                        label.textContent = opt.label;
                        const check = document.createElement('span');
                        check.className = 'check';
                        check.textContent = selectedTiers.has(opt.value) ? '✓' : '';

                        item.appendChild(dot);
                        item.appendChild(label);
                        item.appendChild(check);

                        item.addEventListener('click', function(e) {
                            e.stopPropagation();
                            if (selectedTiers.has(opt.value)) {
                                selectedTiers.delete(opt.value);
                            } else {
                                selectedTiers.add(opt.value);
                            }
                            updateCount();
                            renderMenu();
                            saveFiltersState();
                            applyFilters();
                        });
                        menu.appendChild(item);
                    });
                    updateCount();
                }

                function updateCount() {
                    const size = selectedTiers.size;
                    countSpan.textContent = size > 0 ? `(${size})` : '';
                }

                toggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const isOpen = menu.classList.toggle('open');
                    arrow.classList.toggle('open', isOpen);
                });

                document.addEventListener('click', function() {
                    menu.classList.remove('open');
                    arrow.classList.remove('open');
                });

                renderMenu();
            }

            function getTier(map, mode, type) {
                const key = (mode === 'ckz' ? 'ckz' : 'vnl') + (type === 'nub' ? 'nubtier' : 'protier');
                return map[key] || 0;
            }

            function getBestTime(map, mode, type) {
                if (mode === 'ckz') {
                    return type === 'nub' ? map.bestOverallCkz : map.bestProCkz;
                } else {
                    return type === 'nub' ? map.bestOverallVnl : map.bestProVnl;
                }
            }

            function renderMaps(maps) {
                if (!maps || maps.length === 0) {
                    container.innerHTML = '<div class="no-results">Нет карт</div>';
                    return;
                }

                const filtered = maps.filter(map => {
                    const tier = getTier(map, currentMode, currentType);
                    
                    if (tier === 0) return false;
                    
                    const hasHighTierSelected = selectedTiers.has(9) || selectedTiers.has(10);
                    if (!hasHighTierSelected && (tier === 9 || tier === 10)) return false;
                    
                    if (currentCourse === 'main' && map.courseid !== 1) return false;
                    if (currentCourse === 'bonus' && map.courseid <= 1) return false;
                    if (selectedTiers.size > 0 && !selectedTiers.has(tier)) return false;
                    if (searchTerm && !map.mapname.toLowerCase().includes(searchTerm)) return false;

                    const best = getBestTime(map, currentMode, currentType);
                    const hasPB = best && best > 0;
                    if (currentPb === 'pb' && !hasPB) return false;
                    if (currentPb === 'nopb' && hasPB) return false;
                    return true;
                });

                if (filtered.length === 0) {
                    container.innerHTML = '<div class="no-results">No maps found</div>';
                    return;
                }

                let html = '';
                filtered.forEach(map => {
                    const tier = getTier(map, currentMode, currentType);
                    const tierObj = TIER_OPTIONS.find(t => t.value === tier);
                    const tierColor = tierObj ? tierObj.color : '#6bc96f';
                    const tierName = tierObj ? tierObj.label : 'Unknown';
                    const imageUrl = map.image || `https://raw.githubusercontent.com/YesSeir/cs2kz-maps/main/maps/${map.mapname}.jpg`;
                    const bestTime = getBestTime(map, currentMode, currentType);
                    const timeStr = (bestTime && bestTime > 0) ? formatTime(bestTime) : '—';

                    html += `
                        <div class="card">
                            <img src="${imageUrl}" alt="${map.mapname}" onerror="this.src='/maps/default.jpg'" />
                            <div class="card-body">
                                <div class="tier-name" style="color:${tierColor}">${tierName}</div>
                                <div class="map-title" title="${map.mapname}">
                                    ${map.mapname}
                                    <a href="https://steamcommunity.com/sharedfiles/filedetails/?id=${map.workshopid}" target="_blank" class="steam-link" title="Open Workshop">
                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="16" height="16">
                                            <path fill="#dbdbdb" d="M568 320C568 457 456.8 568 319.6 568C205.8 568 110 491.7 80.6 387.6L175.8 426.9C182.2 459 210.7 483.3 244.7 483.3C283.9 483.3 316.6 450.9 314.9 409.8L399.4 349.6C451.5 350.9 495.2 308.7 495.2 256.1C495.2 204.5 453.2 162.6 401.5 162.6C349.8 162.6 307.8 204.6 307.8 256.1L307.8 257.3L248.6 343C233.1 342.1 217.9 346.4 205.1 355.1L72 300.1C82.2 172.4 189.1 72 319.6 72C456.8 72 568 183 568 320zM227.7 448.3L197.2 435.7C202.8 447.3 212.5 456.5 224.4 461.5C251.3 472.7 282.2 459.9 293.4 433.1C298.8 420.1 298.9 405.8 293.5 392.8C288.1 379.8 278 369.6 265 364.2C252.1 358.8 238.3 359 226.1 363.6L257.6 376.6C277.4 384.8 286.8 407.5 278.5 427.3C270.2 447.2 247.5 456.5 227.7 448.3zM401.5 193.8C435.9 193.8 463.8 221.7 463.8 256.1C463.8 290.5 435.9 318.4 401.5 318.4C367.1 318.4 339.2 290.5 339.2 256.1C339.2 221.7 367.1 193.8 401.5 193.8zM401.6 302.8C427.4 302.8 448.4 281.8 448.4 256C448.4 230.2 427.4 209.2 401.6 209.2C375.8 209.2 354.8 230.2 354.8 256C354.8 281.8 375.8 302.8 401.6 302.8z"/>
                                        </svg>
                                    </a>
                                </div>
                                <div class="coursename">${map.coursename}</div>
                                <div class="best-time">Best: ${timeStr}</div>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            }

            function applyFilters() {
                renderMaps(allMaps);
            }

            async function loadMaps() {
                try {
                    const resp = await fetch('/api/maps');
                    if (!resp.ok) throw new Error('Ошибка сети');
                    const data = await resp.json();
                    allMaps = data;
                    applyFilters();
                    
                    // Восстанавливаем поиск
                    if (searchTerm) {
                        document.getElementById('searchInput').value = searchTerm;
                    }
                } catch (err) {
                    container.innerHTML = '<div class="error">❌ Ошибка загрузки: ' + err.message + '</div>';
                }
            }

            async function refreshBestTimes() {
                try {
                    const resp = await fetch('/api/maps?refresh=1');
                    if (resp.ok) {
                        const data = await resp.json();
                        allMaps = data;
                        applyFilters();
                    }
                } catch (e) {}
            }

            document.getElementById('searchInput').addEventListener('input', function() {
                searchTerm = this.value.toLowerCase().trim();
                saveFiltersState();
                applyFilters();
            });

            // Инициализация слайдеров ДО загрузки карт
            initSliders();
            initTierDropdown();
            loadMaps();

            window.addEventListener('resize', updateAllSliders);

            // Обновление Best каждые 10 секунд
            refreshInterval = setInterval(refreshBestTimes, 10000);

            window.addEventListener('beforeunload', function() {
                if (refreshInterval) {
                    clearInterval(refreshInterval);
                }
            });
        })();
    </script>
</body>
</html>
